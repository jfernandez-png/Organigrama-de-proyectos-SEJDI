<style>

  .nav-bar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 12px 28px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .nav-bar label { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
  .sector-btn { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid #d1d5db; background: #fff; color: #374151; transition: all .15s; }
  .sector-btn:hover { border-color: #6366f1; color: #6366f1; }
  .sector-btn.active-si  { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
  .sector-btn.active-edu { background: #f0fdf4; color: #15803d; border-color: #86efac; }
  .sector-btn.active-sal { background: #fff7ed; color: #c2410c; border-color: #fdba74; }
  .proj-bar { background: #f9fafb; border-bottom: 1px solid #e5e7eb; padding: 10px 28px; display: flex; gap: 6px; flex-wrap: wrap; min-height: 44px; }
  .proj-pill { padding: 4px 12px; border-radius: 6px; font-size: 11.5px; cursor: pointer; border: 1px solid #e5e7eb; background: #fff; color: #4b5563; transition: all .12s; white-space: nowrap; }
  .proj-pill:hover { border-color: #9ca3af; color: #111827; }
  .proj-pill.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; font-weight: 500; }
  .main { padding: 24px 28px; overflow-x: auto; }
  .placeholder { text-align: center; padding: 60px 20px; color: #9ca3af; font-size: 14px; }
  .proj-header { margin-bottom: 20px; }
  .proj-header h2 { font-size: 18px; font-weight: 600; color: #111827; }
  .proj-header .meta { font-size: 12px; color: #6b7280; margin-top: 4px; display: flex; gap: 14px; flex-wrap: wrap; }
  .org-tree { display: flex; flex-direction: column; align-items: center; }
  .top-node { border-radius: 10px; padding: 14px 20px; text-align: center; min-width: 260px; max-width: 360px; border: 1.5px solid; }
  .top-node.gerente   { background: #eff6ff; border-color: #3b82f6; }
  .top-node.encargado { background: #fffbeb; border-color: #f59e0b; }
  .top-node.vacant    { background: #f9fafb; border-color: #d1d5db; }
  .top-node .role-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; opacity: .65; margin-bottom: 5px; }
  .top-node.gerente   .role-label { color: #1d4ed8; }
  .top-node.encargado .role-label { color: #b45309; }
  .top-node.vacant    .role-label { color: #9ca3af; }
  .top-node .full-name { font-size: 13px; font-weight: 600; color: #111827; line-height: 1.35; margin-bottom: 7px; }
  .top-node.vacant .full-name { color: #9ca3af; font-style: italic; }
  .top-node .contact-row { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 11px; color: #4b5563; margin-top: 3px; }
  .top-node .contact-row svg { flex-shrink: 0; opacity: .6; }
  .vline { width: 2px; height: 24px; background: #d1d5db; margin: 0 auto; }
  .team-grid { display: grid; gap: 10px 8px; justify-content: center; }
  .member-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; width: 186px; transition: border-color .12s, box-shadow .12s; }
  .member-card:hover { border-color: #9ca3af; box-shadow: 0 2px 6px rgba(0,0,0,.06); }
  .mc-name  { font-size: 11px; font-weight: 600; color: #111827; line-height: 1.35; margin-bottom: 3px; }
  .mc-role  { font-size: 10px; color: #6b7280; line-height: 1.35; margin-bottom: 5px; }
  .mc-badge { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
  .mc-badge.cas { background: #dcfce7; color: #15803d; }
  .mc-badge.os  { background: #f3f4f6; color: #6b7280; }
  .mc-contact { border-top: 1px solid #f3f4f6; margin-top: 6px; padding-top: 6px; }
  .mc-cline { display: flex; align-items: flex-start; gap: 5px; font-size: 10px; color: #6b7280; line-height: 1.4; margin-top: 2px; word-break: break-all; }
  .mc-cline svg { flex-shrink: 0; margin-top: 1px; opacity: .55; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; color: #6b7280; margin-top: 24px; padding-top: 16px; border-top: 1px solid #e5e7eb; }
  .legend-item { display: flex; align-items: center; gap: 5px; }

function tc(s){
  if(!s)return'';
  const ex=new Set(['de','del','la','las','los','el','en','y','a','con','por','para','al','e']);
  return s.toLowerCase().split(' ').map((w,i)=>(!i||!ex.has(w))?w.charAt(0).toUpperCase()+w.slice(1):w).join(' ');
}
function isGerente(p){ return /gerente\s*(de\s*)?proyecto/i.test(p); }

let curSector=null, curProj=null;

function setSector(s){
  curSector=s; curProj=null;
  document.querySelectorAll('.sector-btn').forEach(b=>b.className='sector-btn');
  const cls=s==='SI'?'active-si':s==='EDU'?'active-edu':'active-sal';
  document.getElementById('btn-'+s).classList.add(cls);
  renderProjBar(); renderMain();
}

function renderProjBar(){
  const bar=document.getElementById('proj-bar');
  bar.innerHTML='';
  if(!curSector)return;
  Object.keys(DATA[curSector].projects).forEach(p=>{
    const btn=document.createElement('button');
    btn.className='proj-pill'+(p===curProj?' active':'');
    btn.textContent=p;
    btn.onclick=()=>{curProj=p;renderProjBar();renderMain();};
    bar.appendChild(btn);
  });
}

function renderMain(){
  const main=document.getElementById('main');
  if(!curProj||!curSector){
    main.innerHTML='<div class="placeholder"><p>Selecciona un sector y luego un proyecto</p></div>';
    return;
  }
  const members=DATA[curSector].projects[curProj];
  const gerenteRec=members.find(m=>isGerente(m.p));
  const rest=members.filter(m=>!isGerente(m.p));
  const totalCas=members.filter(m=>m.m==='CAS').length;
  const totalOs=members.filter(m=>m.m==='OS').length;
  const isEnc=gerenteRec&&/\(E\)/i.test(gerenteRec.p);
  const isVacant=!gerenteRec||!gerenteRec.n;

  let gerenteHTML='';
  if(gerenteRec){
    const cls=isVacant?'vacant':isEnc?'encargado':'gerente';
    gerenteHTML=`<div class="top-node ${cls}">
      <div class="role-label">${tc(gerenteRec.p)}</div>
      <div class="full-name">${isVacant?'Vacante':tc(gerenteRec.n)}</div>
      ${!isVacant&&gerenteRec.t?`<div class="contact-row">${iP}&nbsp;${gerenteRec.t}</div>`:''}
      ${!isVacant&&gerenteRec.c?`<div class="contact-row">${iM}&nbsp;${gerenteRec.c}</div>`:''}
    </div>`;
  }

  const cols=rest.length<=2?rest.length:rest.length<=6?3:rest.length<=12?4:5;
  const teamHTML=rest.length>0?`
    <div class="vline"></div>
    <div class="team-grid" style="grid-template-columns:repeat(${cols},186px)">
      ${rest.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:center">
          <div style="width:1px;height:14px;background:#d1d5db"></div>
          <div class="member-card">
            <div class="mc-name">${tc(m.n)}</div>
            <div class="mc-role">${m.p}</div>
            <span class="mc-badge ${m.m.toLowerCase()}">${m.m}</span>
            ${(m.t||m.c)?`<div class="mc-contact">
              ${m.t?`<div class="mc-cline">${iP}&nbsp;${m.t}</div>`:''}
              ${m.c?`<div class="mc-cline">${iM}&nbsp;${m.c}</div>`:''}
            </div>`:''}
          </div>
        </div>`).join('')}
    </div>`:''

  main.innerHTML=`
    <div class="proj-header">
      <h2>${curProj}</h2>
      <div class="meta">
        <span>👥 ${members.length} miembros</span>
        <span style="color:#15803d">● ${totalCas} CAS</span>
        <span style="color:#6b7280">● ${totalOs} OS</span>
        <span style="color:#6b7280">Sector: ${DATA[curSector].label}</span>
      </div>
    </div>
    <div class="org-tree">
      ${gerenteHTML}
      ${teamHTML}
    </div>
    <div class="legend">
      <div class="legend-item"><span class="mc-badge cas">CAS</span> Contrato Administrativo de Servicios</div>
      <div class="legend-item"><span class="mc-badge os">OS</span> Orden de Servicio</div>
      <div class="legend-item" style="color:#b45309">■ (E) Encargado</div>
    </div>`;
}
</script>
</body>
</html>
